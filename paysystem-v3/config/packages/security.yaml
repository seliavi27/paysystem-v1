security:
  password_hashers:
    App\Entity\User: 'auto'

  providers:
    app_users:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    api:
      pattern: ^/api
      stateless: true
      provider: app_users
      custom_authenticators:
        - App\Security\JwtAuthenticator
      entry_point: App\Security\JwtAuthenticator

    main:
      lazy: true
      provider: app_users
      custom_authenticators:
        - App\Security\JwtAuthenticator
      logout:
        path: auth_logout
        target: auth_login_form
      entry_point: App\Security\JwtAuthenticator

  access_control:
    - { path: ^/(login|register|auth/login|auth/register)$, roles: PUBLIC_ACCESS }
    - { path: ^/api/, roles: ROLE_USER }
    - { path: ^/, roles: ROLE_USER }