doctrine:
  dbal:
    url: '%env(resolve:DATABASE_URL)%'
    server_version: '16-alpine'

  orm:
    controller_resolver:
      auto_mapping: false
    enable_native_lazy_objects: true

    entity_managers:
      default:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
          App:
            is_bundle: false
            type: attribute
            dir: '%kernel.project_dir%/src/Entity'
            prefix: 'App\Entity'
            alias: App

when@prod:
  doctrine:
    orm:
      auto_generate_proxy_classes: false